<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeltaList React Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .app { max-width: 600px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 16px; font-size: 14px; }
        .tab-bar { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px 8px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: #333; background: #f0f0f0; }
        .tab.active { color: #1976d2; border-bottom-color: #1976d2; }
        .demo-panel { display: flex; flex-direction: column; gap: 12px; }
        .button-bar { display: flex; gap: 8px; flex-wrap: wrap; }
        .button-bar button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .button-bar button:hover:not(:disabled) { background: #e3f2fd; border-color: #1976d2; }
        .button-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
        .item-list { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
        .item-card:hover { border-color: #90caf9; }
        .item-card.selected { background: #e3f2fd; border-color: #1976d2; }
        .item-title { font-weight: 500; }
        .item-id, .item-subtitle { font-size: 12px; color: #888; }
        .empty-state { text-align: center; padding: 32px; color: #999; font-style: italic; }
        .section-header { padding: 10px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; }
        .section-header.selected { border-color: #fff; box-shadow: 0 0 0 2px #1976d2; }
        .section-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px 8px 28px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #e8eaf6; border-radius: 6px; font-size: 13px; }
        .loading-badge { background: #ff9800; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .filter-bar { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; }
        .filter-checkbox { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .placeholder { opacity: 0.5; background: #f9f9f9; }
        .placeholder-text { color: #aaa; font-style: italic; }
        .drag-status { font-weight: 500; }
        .drag-status.dragging { background: #fff3e0; }
        .drag-status.committing { background: #e8f5e9; }
        .drag-handle { cursor: grab; margin-right: 10px; font-size: 16px; color: #999; }
        .item-card.pinned { background: #ffebee; border-color: #ef9a9a; }
        .item-card.draggable { cursor: grab; }
        .item-card.draggable:active { cursor: grabbing; }
        .paginated-list { max-height: 350px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="demo-react.js"></script>
</body>
</html>
